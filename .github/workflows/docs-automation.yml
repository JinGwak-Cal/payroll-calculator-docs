name: docs-automation
on:
  push:
    branches: [ main ]
    paths:
      - 'absolute-rules.md'
      - 'current-step.md'
      - 'decisions.md'
jobs:
  merge-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token from GitHub App
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0 # 전체 히스토리를 가져오도록 설정
          ref: main # main 브랜치를 명시적으로 체크아웃
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run merge script
        run: python scripts/merge_docs.py
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main # 최신 변경 사항을 먼저 가져와 리베이스
          git add merged-context.md
          git commit -m "docs: auto-update merged-context.md [skip ci]" || echo "No changes to commit" # 변경 사항이 있을 때만 커밋
          git push # 일반 푸시 (bypass actor 권한 사용)
