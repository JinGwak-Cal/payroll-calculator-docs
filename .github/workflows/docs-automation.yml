name: docs-automation

on:
  push:
    branches: [main]
    paths:
      - absolute-rules.md
      - current-step.md
      - decisions.md
  pull_request:
    branches: [main]
    paths:
      - absolute-rules.md
      - current-step.md
      - decisions.md

jobs:
  # ── PR 단계: 검증만 / 파일 커밋 금지 ─────────────────────────
  validate:
    name: 문서 검증 (PR / push 공통)
    runs-on: ubuntu-latest
    # 수정1: 검증 job은 read 전용 — write 권한 없음
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: V-1~V-5 검증 실행 (생성 없이 검증만)
        run: |
          python scripts/merge_docs.py --validate-only

  # ── main 병합 후: merged-context.md 실제 생성 및 커밋 ──────────
  merge-and-commit:
    name: merged-context.md 재생성
    runs-on: ubuntu-latest
    needs: validate
    # main push 이벤트일 때만 실행 (PR은 validate만)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # 수정1: 생성 job만 write 권한
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: merged-context.md 생성
        run: |
          python scripts/merge_docs.py

      - name: 변경 여부 확인
        id: diff
        run: |
          if git diff --quiet merged-context.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: bot 커밋 및 push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged-context.md
          # 수정2: head_commit.message 제거 — shell injection 방지
          git commit -m "docs: auto-regenerate merged-context.md [skip ci]"
          echo "Generated commit: $(git rev-parse HEAD)"
          git push
        # [skip ci]: 이 커밋이 다시 워크플로우를 트리거하지 않도록 방지
        # 무한 루프 2중 방지: GITHUB_TOKEN bot 커밋은 기본적으로 재트리거 안 됨

      - name: 변경 없음 보고
        if: steps.diff.outputs.changed == 'false'
        run: |
          echo "[INFO] merged-context.md 변경 없음 — 커밋 생략"
